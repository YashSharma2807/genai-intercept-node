<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        background-color: #111111;
        color: #e5e5e5;
        font-family:
          "Inter",
          -apple-system,
          sans-serif;
      }
    </style>
  </head>
  <body class="flex items-center justify-center h-screen overflow-hidden">
    <div
      class="bg-[#1e1e1e] border border-[#333] p-10 rounded-2xl w-full max-w-md shadow-2xl"
    >
      <div class="text-center mb-10">
        <div
          class="w-14 h-14 bg-[#1a1a1a] border border-[#333] text-[#dfff00] rounded-xl flex items-center justify-center mx-auto mb-5 text-2xl font-bold"
        >
          H
        </div>
        <h2 class="text-2xl font-bold text-white tracking-tight">Login</h2>
        <p class="text-xs text-gray-500 mt-2 tracking-wide">
          Enter your admin credentials.
        </p>
      </div>

      {% if error %}
      <div
        class="bg-red-900/20 border border-red-500/30 text-red-400 p-3 rounded-lg mb-6 text-xs text-center font-bold tracking-wider"
      >
        {{ error }}
      </div>
      {% endif %}

      <form action="/login" method="POST" class="space-y-5">
        <div>
          <input
            type="text"
            name="username"
            placeholder="Username"
            required
            class="w-full bg-[#111111] border border-[#333] rounded-lg p-3.5 text-white focus:outline-none focus:border-[#dfff00] transition text-sm"
          />
        </div>
        <div>
          <input
            type="password"
            name="password"
            placeholder="Password"
            required
            class="w-full bg-[#111111] border border-[#333] rounded-lg p-3.5 text-white focus:outline-none focus:border-[#dfff00] transition text-sm"
          />
        </div>
        <button
          type="submit"
          class="w-full bg-[#dfff00] hover:bg-[#c9e600] text-black font-bold py-3.5 rounded-lg transition mt-4 text-sm tracking-wide"
        >
          Get Started ✦
        </button>
      </form>

      <div class="text-center mt-8">
        <a
          href="/"
          class="text-xs text-gray-500 hover:text-white transition font-medium tracking-wide"
          >← Return to Chat</a
        >
      </div>
    </div>
  </body>
</html>
